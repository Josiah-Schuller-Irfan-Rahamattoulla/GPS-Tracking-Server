services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: gps-tracking-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gpsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gpspassword}
      POSTGRES_DB: ${POSTGRES_DB:-gps_tracking}
    ports:
      - "5433:5432"  # Host 5433 to avoid conflict with local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/gps_tracking_database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/migration_001_add_features.sql:/docker-entrypoint-initdb.d/02-migration.sql:ro
      - ./database/migration_002_allow_multiple_devices_per_sms.sql:/docker-entrypoint-initdb.d/03-multi-device.sql:ro
      - ./database/migration_003_add_geofence_breach_events.sql:/docker-entrypoint-initdb.d/04-geofence-breaches.sql:ro
      - ./database/migration_004_notification_audit_log.sql:/docker-entrypoint-initdb.d/05-notification-audit.sql:ro
      - ./database/migration_005_device_tracking_mode.sql:/docker-entrypoint-initdb.d/06-tracking-mode.sql:ro
      - ./database/migration_006_remote_viewing.sql:/docker-entrypoint-initdb.d/07-remote-viewing.sql:ro
      - ./database/migration_007_remove_unused_tracking_fields.sql:/docker-entrypoint-initdb.d/08-tracking-cleanup.sql:ro
      - ./database/migration_008_remote_viewing_not_null.sql:/docker-entrypoint-initdb.d/09-remote-viewing-nn.sql:ro
      - ./database/migration_009_command_recovery_ack.sql:/docker-entrypoint-initdb.d/10-command-recovery-ack.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gpsuser} -d ${POSTGRES_DB:-gps_tracking}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Database migrations runner (idempotent SQL)
  migrate:
    image: postgres:16-alpine
    container_name: gps-tracking-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gpsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gpspassword}
      POSTGRES_DB: ${POSTGRES_DB:-gps_tracking}
    volumes:
      - ./database:/migrations:ro
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      set -euo pipefail;
      echo "Running DB migrations...";
      export PGPASSWORD="${POSTGRES_PASSWORD}";
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/gps_tracking_database.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_001_add_features.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_002_allow_multiple_devices_per_sms.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_003_add_geofence_breach_events.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_004_notification_audit_log.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_005_device_tracking_mode.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_006_remote_viewing.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_007_remove_unused_tracking_fields.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_008_remote_viewing_not_null.sql;
      psql -h db -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /migrations/migration_009_command_recovery_ack.sql;
      echo "Migrations complete.";

  # FastAPI Server
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gps-tracking-api
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-gpsuser}:${POSTGRES_PASSWORD:-gpspassword}@db:5432/${POSTGRES_DB:-gps_tracking}
      # nRF Cloud Location Services (new auth): Memfault Organization Auth Token (OAT) + org/project slugs.
      NRFCLOUD_OAT: ${NRFCLOUD_OAT}
      NRFCLOUD_ORG_SLUG: ${NRFCLOUD_ORG_SLUG}
      NRFCLOUD_PROJECT_SLUG: ${NRFCLOUD_PROJECT_SLUG}
      # Legacy (deprecated) auth (kept only for migration/back-compat in code).
      NRF_CLOUD_API_KEY: ${NRF_CLOUD_API_KEY:-}
      # A-GNSS provider: empty = try nRF Cloud first, fallback to SUPL; or set to NRF_CLOUD or SUPL
      AGNSS_PROVIDER: ${AGNSS_PROVIDER:-}
      # SUPL demo mode returns fake A-GNSS data; keep disabled by default.
      SUPL_DEMO: ${SUPL_DEMO:-0}
      # Cell location provider: nrf_cloud, google, here, or auto
      CELL_LOCATION_PROVIDER: ${CELL_LOCATION_PROVIDER:-auto}
      GOOGLE_GEOLOCATION_API_KEY: ${GOOGLE_GEOLOCATION_API_KEY}
      HERE_API_KEY: ${HERE_API_KEY}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
