name: Build and Deploy to AWS

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: gps-tracking
  ECR_REGISTRY: 831181103720.dkr.ecr.ap-southeast-2.amazonaws.com

jobs:
  build-and-push-to-ecr:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      working-directory: ./api
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build the Docker image
        docker build -t $ECR_REPOSITORY .
        
        # Tag the image with both latest and git commit SHA
        docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        
        # Push both tags to ECR
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        
        # Output image URI for use in other jobs/steps
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push-to-ecr
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # Optional: set ALB idle timeout to 1 hour for WebSockets. Add variable AWS_ALB_NAME (repo Settings → Secrets and variables → Actions → Variables).
    - name: Set ALB idle timeout for WebSockets
      if: ${{ vars.AWS_ALB_NAME != '' }}
      env:
        ALB_NAME: ${{ vars.AWS_ALB_NAME }}
        AWS_REGION: ${{ env.AWS_REGION }}
      run: |
        ALB_ARN=$(aws elbv2 describe-load-balancers \
          --names "$ALB_NAME" \
          --query 'LoadBalancers[0].LoadBalancerArn' \
          --output text --region "$AWS_REGION")
        aws elbv2 modify-load-balancer-attributes \
          --load-balancer-arn "$ALB_ARN" \
          --attributes Key=idle_timeout.timeout_seconds,Value=3600 \
          --region "$AWS_REGION"
        echo "ALB idle timeout set to 3600s (1 hour) for WebSockets"

    - name: Deploy to ECS
      env:
        ECS_CLUSTER: ${{ secrets.AWS_ECS_CLUSTER_NAME }}
        ECS_SERVICE: ${{ secrets.AWS_ECS_SERVICE_NAME }}
      run: |
        # Force a new deployment to pull the updated 'latest' image
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --force-new-deployment
        
        # Wait for the deployment to complete
        aws ecs wait services-stable \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE
        
        echo "Deployment completed successfully!"
