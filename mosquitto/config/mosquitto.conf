# Mosquitto MQTT broker for GPS tracker device messaging.
#
# Two listeners:
#   1883 — internal Docker network only (FastAPI pub/sub, no TLS, anonymous)
#   8883 — external devices (nRF9151 over TLS + username/password + ACL)

# Required so 1883 stays anonymous while 8883 uses passwd + ACL.
per_listener_settings true

persistence true
persistence_location /mosquitto/data/

# Required for Docker healthcheck ($SYS/broker/version).
sys_interval 10

# Log to stdout so `docker compose logs mosquitto` shows connection issues.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ---------------------------------------------------------------------------
# Internal listener — FastAPI publishes here (docker network only).
# Not exposed on the host in docker-compose.yml.
# ---------------------------------------------------------------------------
listener 1883
protocol mqtt
listener_allow_anonymous true

# ---------------------------------------------------------------------------
# External listener — cellular devices (TLS required).
# Devices authenticate with username=device_id, password=access_token.
# ---------------------------------------------------------------------------
listener 8883
protocol mqtt
listener_allow_anonymous false
cafile /mosquitto/data/certs/ca.crt
certfile /mosquitto/data/certs/server.crt
keyfile /mosquitto/data/certs/server.key
require_certificate false
use_identity_as_username false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# QoS 1 messages are stored while persistence=true (survives broker restart).
# max_queued_messages caps memory use if a device is offline for a long time.
max_queued_messages 1000
